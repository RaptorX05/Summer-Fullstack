<!DOCTYPE html>
<html lang="en">
<head>
    <title>Razorpay Navbar</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .navbar{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 35px;
            padding: 20px;
            background-color: white;
            border-bottom: 1px solid #ddd;
        }

        .logo{
            font-size: 30px;
            font-weight: bold;
            color: #0b72e7;
            margin-right: 20px;
        }

        .navbar a{
            text-decoration: none;
            color: #333;
            font-size: 15px;
            font-weight: 500;
        }

        .navbar a:hover{
            color: #0b72e7;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Razorpay</div>

        <a href="#">Agentic Stack</a>
        <a href="#">Payments</a>
        <a href="#">Banking+</a>
        <a href="#">Payroll</a>
        <a href="#">Engage</a>
        <a href="#">Partners</a>
        <a href="#">Resources</a>
        <a href="#">Pricing</a>
    </nav>

</body>
</html>
